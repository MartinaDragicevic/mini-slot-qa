<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mini Slot QA</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Mini Slot QA</h1>

    <section>
      <p>Balance: <span data-testid="balance">...</span> credits</p>
      <p>Bet: <span data-testid="bet">...</span> credits</p>
    </section>

    <section>
      <div data-testid="reel-1">🍒</div>
      <div data-testid="reel-2">🍋</div>
      <div data-testid="reel-3">🍇</div>
    </section>

    <section>
      <button data-testid="decrease-bet" disabled>-</button>
      <button data-testid="spin-button" disabled>Spin</button>
      <button data-testid="increase-bet" disabled>+</button>
    </section>

    <p data-testid="message">Loading game configuration...</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
